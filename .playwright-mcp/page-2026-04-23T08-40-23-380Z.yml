            - heading "A family apiary in the heart of the Pamir" [level=2] [ref=e60]
            - paragraph [ref=e61]: Pchelovod is a small family operation at the foot of the Fann mountains. We tend our hives through the short but intense alpine season — from the first thaw to the last meadow bloom. The honey is raw, unfiltered, and moves as slowly as the bees that make it.
